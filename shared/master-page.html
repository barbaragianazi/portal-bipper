<!-- Modelo inicial de página. É uma página pronta com sidebar, topbar, seletor de marcas e área .content para você substituir pelo conteúdo da nova tela. -->

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Bipper - Pagina Mestre</title>
  <link rel="icon" type="image/png" href="shared/assets/logos/fav-icon.png">
  <link rel="stylesheet" href="shared/design-tokens.css">
  <link rel="stylesheet" href="shared/base-components.css">
  <link rel="stylesheet" href="shared/app-shell.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Menu principal">
      <div class="brand" data-brands-url="shared/data/brands.json">
        <div class="brand__area" aria-label="Marca ativa">
          <button class="brand__logo-btn" type="button" aria-label="Selecionar marca" aria-haspopup="true" aria-expanded="false">
            <img src="shared/assets/logos/zoetis-dark.svg" alt="Zoetis" class="brand__logo" data-logo="dark">
          </button>
          <div class="brand-dropdown" role="menu" aria-label="Selecionar marca"></div>
        </div>
        <button class="brand__toggle" id="sidebarToggle" type="button" aria-label="Recolher menu" aria-expanded="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
      </div>

      <nav class="nav-section" aria-label="Navegacao principal">
        <h2>Principal</h2>
        <a class="nav-link active" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M3 11.5 12 4l9 7.5"></path>
            <path d="M5 10.5V20h14v-9.5"></path>
          </svg>
          <span>Dashboard</span>
        </a>
        <a class="nav-link" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 5h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 19h16"></path>
          </svg>
          <span>Modulos</span>
        </a>
        <a class="nav-link" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M12 20V10"></path>
            <path d="M18 20V4"></path>
            <path d="M6 20v-6"></path>
          </svg>
          <span>Indicadores</span>
          <span class="nav-badge">3</span>
        </a>
      </nav>

      <div class="sidebar-card">
        <strong>Central de suporte</strong>
        <p>Use este bloco para links de ajuda, atalhos institucionais ou comunicados fixos.</p>
        <a href="#">Abrir suporte</a>
      </div>
    </aside>

    <button class="sidebar-overlay" id="sidebarOverlay" type="button" aria-label="Fechar menu"></button>

    <main class="main">
      <header class="topbar">
        <button class="mobile-menu" id="openMenu" type="button" aria-label="Abrir menu" aria-expanded="false">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 6h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 18h16"></path>
          </svg>
        </button>

        <span class="env-pill">Portal</span>

        <div class="topbar-actions">
          <button class="icon-btn" type="button" aria-label="Notificacoes">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notification-dot">3</span>
          </button>
          <button class="icon-btn" type="button" aria-label="Configuracoes">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.36.4.67.6 1H20a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-.51 1Z"></path>
            </svg>
          </button>
          <div class="profile" aria-label="Perfil do usuario">
            <span class="avatar">BG</span>
            <div>
              <strong>Barbara Gianazi</strong>
              <small>Administradora</small>
            </div>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="section-title">
          <div>
            <h2>Conteudo da nova tela</h2>
            <p>Substitua esta area pelo conteudo especifico do projeto.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="shared/app-shell.js"></script>
</body>
</html>
